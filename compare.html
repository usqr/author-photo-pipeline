.progress-bar{height:100%;background:linear-gradient(90deg,#4ecca3,#e94560);border-radius:4px;transition:width .3s}
.progress-text{font-size:11px;color:#aaa;display:flex;justify-content:space-between}
.progress-pass{color:#4ecca3;font-weight:bold}

.controls{display:flex;justify-content:center;gap:10px;margin-bottom:15px;flex-wrap:wrap}
.controls button{padding:7px 14px;border:1px solid #444;background:#16213e;color:#eee;border-radius:6px;cursor:pointer;font-size:12px}
.controls button:hover{background:#0f3460}
.btn-rerun{background:#0a3a0a!important;border-color:#4ecca3!important;color:#4ecca3!important}

.btn-stop{background:#3a0a0a!important;border-color:#e94560!important;color:#e94560!important}
.btn-stop:hover{background:#5a0a0a!important}
.filter-bar{display:flex;justify-content:center;gap:8px;margin-bottom:15px}
.badge{padding:4px 10px;border-radius:12px;font-size:11px;cursor:pointer;border:1px solid #333}

.ref-row{display:flex;gap:12px;justify-content:center;margin:15px 0;padding:15px;background:#16213e;border-radius:12px;flex-wrap:wrap}

.author-row{background:#16213e;padding:12px;border-radius:10px;margin-bottom:8px}
.rsec{display:flex;gap:10px;align-items:flex-start}
.rsec+.rsec{margin-top:5px;padding-top:5px;border-top:1px solid #2a2a4e}
.author-images{display:flex;gap:6px;align-items:center}
.author-images .card{text-align:center;flex-shrink:0}
.img-n{width:110px;height:110px;object-fit:cover;border-radius:8px;border:2px solid #4ecca3;transition:transform .2s}
.img-n:hover{transform:scale(3.5);position:relative;z-index:100}
.img-p{width:65px;height:65px;object-fit:cover;border-radius:6px;border:2px solid #f0a500;opacity:.9;transition:transform .2s}
.img-p:hover{transform:scale(4);position:relative;z-index:100;opacity:1}
.img-b{width:65px;height:65px;object-fit:cover;border-radius:6px;border:2px solid #e94560;opacity:.85;transition:transform .2s}
.img-b:hover{transform:scale(4);position:relative;z-index:100;opacity:1}

.ghost-marker{position:absolute;top:-2px;width:2px;height:14px;background:#f0a500;opacity:.8;pointer-events:none;border-radius:1px;z-index:5}
.ghost-label{position:absolute;top:-13px;font-size:7px;color:#f0a500;pointer-events:none;transform:translateX(-50%);white-space:nowrap}

.export-area{margin-top:20px;text-align:center}
textarea{width:90%;height:150px;background:#0a0a1a;color:#4ecca3;border:1px solid #333;border-radius:8px;padding:10px;font-family:monospace;font-size:11px}
h2{margin-top:25px;font-size:16px}

function copyJSON(){navigator.clipboard.writeText(JSON.stringify(ged(),null,2)).then(function(){alert("Copied!");});}
function importJSON(){try{var d=JSON.parse(document.getElementById("jsonArea").value);FILES.forEach(function(f,i){SCALES.forEach(function(s){var v=(d[f.name]&&d[f.name][s.key])||0;ratings[f.name][s.key]=v;document.getElementById("s-"+i+"-"+s.key).value=v;var e=document.getElementById("v-"+i+"-"+s.key);e.textContent=v;e.className="sv "+(v<0?"neg":v>0?"pos":"zero");});document.getElementById("row-"+i).className="author-row "+(SCALES.some(function(s){return ratings[f.name][s.key]!==0;})?"row-issue":"row-ok");});us();alert("Imported "+Object.keys(d).length);}catch(e){alert("Error: "+e.message);}}

// Progress polling
var progressTimer=null;
function startProgressPoll(){
  document.getElementById("progress-container").classList.add("active");
  progressTimer=setInterval(function(){
    fetch("/api/progress").then(function(r){return r.json();}).then(function(d){
      if(d.done){
        clearInterval(progressTimer);progressTimer=null;
        document.getElementById("p-pass").textContent="Done";
        document.getElementById("p-name").textContent="Complete!";
        document.getElementById("p-bar").style.width="100%";
        document.getElementById("p-file").textContent="";
        setTimeout(function(){
          document.getElementById("progress-container").classList.remove("active");
          location.reload();
        },2000);
        return;
      }
      var totalPasses=4;
      var passProgress=(d.current/Math.max(d.total,1))*100;
      var overallProgress=((d.pass-1)/totalPasses)*100+(passProgress/totalPasses);
      document.getElementById("p-pass").textContent=d.pass+"/4";
      document.getElementById("p-name").textContent=d.pass_name;
      document.getElementById("p-cur").textContent=d.current;
      document.getElementById("p-tot").textContent=d.total;
      document.getElementById("p-file").textContent=d.filename;
      document.getElementById("p-bar").style.width=overallProgress+"%";
    }).catch(function(){});
  },2000);
}

// Rerun
function rerun(){
  if(!confirm("Save current weights and re-run pipeline?"))return;
  var data=JSON.stringify(ged(),null,2);
  fetch("/api/rerun",{method:"POST",headers:{"Content-Type":"application/json"},body:data})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.status==="started"){
        startProgressPoll();
      }
    })
    .catch(function(e){alert("Error: "+e);});
}

// End all
function endAll(){
  if(!confirm("Stop all running scripts and the server?"))return;
  fetch("/api/stop",{method:"POST"})
    .then(function(){window.close();})
    .catch(function(){window.close();});
}

// Check if pipeline is running on load
function checkRunning(){
  fetch("/api/progress").then(function(r){return r.json();}).then(function(d){
    if(!d.done)startProgressPoll();
  }).catch(function(){});
}

var st;function as(){clearTimeout(st);st=setTimeout(function(){localStorage.setItem("arV5h",JSON.stringify(ratings));},1000);}
window.addEventListener("load",function(){
  init();

});
